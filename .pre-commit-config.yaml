# .pre-commit-config.yaml

repos:
  - repo: https://github.com/psf/black
    rev: 23.9.1 # Use the latest stable version of Black
    hooks:
      - id: black
        language_version: python3 # Adjust if using a specific Python version

  - repo: https://github.com/PyCQA/isort
    rev: 5.12.0 # Use the latest stable version of isort
    hooks:
      - id: isort
        args: ["--profile=black"] # Ensure compatibility with Black’s style

  - repo: https://github.com/PyCQA/flake8
    rev: 6.1.0 # Use the latest stable version of Flake8
    hooks:
      - id: flake8
        args:
          - --max-line-length=88 # Set to Black's default line length
          - --ignore=E203,W503 # Ignore specific rules to align with Black's formatting
